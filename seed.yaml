goal: Implement obsidian-claude v0.6.0 webview foundation — a custom Obsidian ItemView
  that spawns `claude -p --output-format=stream-json` via child_process, parses JSONL
  events, and renders assistant text / tool_use / tool_result / result as structured
  HTML cards, coexisting with the existing xterm.js ClaudeTerminalView via a uiMode
  toggle, across 9 iterations (Phase 0/1/2/3/4a/4b/5a/5b/6) validated by 8 fixtures
  plus a single real `claude -p` smoke test.
