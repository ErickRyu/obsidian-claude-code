ontology_schema:
  name: WebviewStreamSession
  description: Domain model for a single `claude -p --output-format=stream-json` child-process
    session rendered inside the Obsidian webview ItemView — captures the JSONL event
    stream, parser bookkeeping, card render output, permission configuration, and
    coexistence state with the legacy xterm terminal view.
  fields:
  - name: sessionId
    type: string
    description: UUID session identifier emitted by `claude -p` in the init event
    required: true
  - name: uiMode
    type: string
    description: User setting controlling which view is active — "terminal" (default,
      xterm.js) or "webview" (new)
    required: true
  - name: permissionPreset
    type: string
    description: Dropdown selection mapped to --allowedTools + --permission-mode flags
      — one of Safe/Standard/Full
    required: true
  - name: events
    type: array
    description: Ordered JSONL events parsed from stdout stream (assistant / tool_use
      / tool_result / result / system / UnknownEvent wrappers)
    required: true
  - name: cards
    type: array
    description: Structured HTML card records rendered from events with kind, DOM
      node reference, and source event index
    required: true
  - name: cardKinds
    type: array
    description: Set of distinct card kinds emitted this session (used for fixture
      assertion)
    required: true
  - name: cardCountByKind
    type: object
    description: Map of card kind to count (used for fixture assertion)
    required: true
  - name: eventCountByType
    type: object
    description: Map of event.type to count (used for differential fixture assertion)
    required: true
  - name: rawSkipped
    type: number
    description: Count of non-JSON lines gracefully skipped by parser — must be 0
      for all fixtures
    required: true
  - name: unknownEventCount
    type: number
    description: Count of events with unrecognized type field preserved as UnknownEvent
      wrappers — separate axis from rawSkipped
    required: true
  - name: lineBufferTail
    type: string
    description: Residual partial-chunk tail held by LineBuffer.flush() between stdout
      chunks
    required: true
  - name: errorClass
    type: string
    description: Classification of last surfaced error — spawn-failure / parse-error
      / partial-event / stderr / epipe / unknown-event / none
    required: true
  - name: showDebugSystemEvents
    type: boolean
    description: Setting gating render of hook_* events and UnknownEvent cards to
      the user
    required: true
  - name: showThinking
    type: boolean
    description: Setting gating render of thinking blocks in assistant events
    required: true
  - name: lastSessionId
    type: string
    description: Persisted prior session_id for --resume support
    required: true
  - name: phase
    type: string
    description: Current iteration phase — Phase 0 / 1 / 2 / 3 / 4a / 4b / 5a / 5b
      / 6
    required: true
  - name: evidenceArtifact
    type: object
    description: Per-phase evidence JSON written to artifacts/ capturing rawSkipped,
      unknownEventCount, cardCountByKind, eventCountByType, and smoke outcome
    required: true
evaluation_principles:
- name: error-surface-discipline
  description: Every error class (spawn / parse / partial / stderr / EPIPE / UnknownEvent)
    follows its fixed policy with no silent swallowing and no throws escaping the
    parser
  weight: 1.0
- name: fixture-replay-determinism
  description: All 8 fixtures parse with rawSkipped===0 and satisfy key-field assertions
    including differential input checks — no HTML snapshot fragility
  weight: 1.0
- name: coexistence-zero-regression
  description: Existing 81/81 vitest tests stay green and uiMode="terminal" path exhibits
    zero behavior change at every phase gate
  weight: 1.0
- name: opt-in-safety
  description: New settings fields default to values that preserve existing-user behavior
    exactly (uiMode="terminal"), migration is pure Object.assign of defaults
  weight: 0.9
- name: ux-transparency
  description: Parser drift and unknown events are visible to debug users via collapsed
    JSON dump cards rather than hidden, enabling future schema-drift detection
  weight: 0.8
- name: phase-gated-progress
  description: No phase declared complete until its verification matrix (including
    full vitest regression row) passes and phase-N-complete git tag is applied
  weight: 0.9
- name: documentation-sufficiency
  description: README gains opt-in Webview beta section documenting enablement + constraints,
    manual smoke checklist signed by git author
  weight: 0.6
- name: performance-observational
  description: vitest completes ≤60s and `claude -p` smoke ≤30s timeout with no hang
    — no numeric latency/memory thresholds enforced in beta
  weight: 0.3
