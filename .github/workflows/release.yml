name: Release Obsidian plugin

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Verify tag matches manifest.json version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag_version="${tag#v}"
          manifest_version=$(node -p "require('./manifest.json').version")
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "::error::Tag $tag (version $tag_version) does not match manifest.json version $manifest_version"
            exit 1
          fi

      - name: Build plugin
        run: |
          npm install --ignore-scripts
          npm run build

      - name: Extract CHANGELOG section for this version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag_version="${tag#v}"
          # Grab the block between `## [<version>]` and the next `## ` heading.
          awk -v ver="$tag_version" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section for $tag_version — falling back to the tag name." >&2
            echo "Release $tag" > release-notes.md
          fi

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --notes-file release-notes.md \
            --draft \
            main.js manifest.json styles.css

  build-native:
    needs: build
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
          - os: macos-15
            platform: darwin-x64
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: win32-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install and rebuild node-pty
        run: |
          npm install --ignore-scripts
          npx @electron/rebuild -v 34.2.0 -o node-pty

      - name: Package native binary
        shell: bash
        run: |
          mkdir -p native/${{ matrix.platform }}
          cp -r node_modules/node-pty native/${{ matrix.platform }}/
          cd native
          tar -czf ../node-pty-${{ matrix.platform }}.tar.gz ${{ matrix.platform }}

      - name: Upload to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release upload "$tag" node-pty-${{ matrix.platform }}.tar.gz --clobber
